<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pink Neon 3D Room</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #050005;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .title {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd6f5;
      font-size: 18px;
      letter-spacing: 4px;
      text-shadow:
        0 0 8px #ff4fd8,
        0 0 20px #ff4fd8,
        0 0 45px #ff00b7;
      z-index: 10;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 220, 246, 0.85);
      font-size: 13px;
      letter-spacing: 1px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="title">PINK NEON 3D ROOM</div>
  <div class="hint">마우스로 드래그하면 방을 돌려볼 수 있어요</div>

  <!-- Three.js 불러오기 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- 마우스 컨트롤 불러오기 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- 내가 만든 3D 코드 -->
  <script src="./script.js"></script>
</body>
</html>
